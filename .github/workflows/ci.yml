name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint
        run: uv run ruff check

      - name: Type check
        run: uv run mypy site_search

      - name: Test (no local-only fixtures)
        run: uv run pytest -m "not local_only"
